<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>తెలుగు AI సహాయకుడు | Modern Voice Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', 'Noto Sans Telugu', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #020617);
            min-height: 100vh;
        }

        /* Glassmorphism effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        /* Custom Scrollbar */
        #chat-container::-webkit-scrollbar {
            width: 5px;
        }
        #chat-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        /* Pulse Animation for Mic */
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .mic-active {
            animation: pulse-green 1.5s infinite;
            background: #ef4444 !important; /* Changes to red when listening */
        }

        .bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            margin-bottom: 10px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body class="text-white flex items-center justify-center p-4">

<div class="glass-card w-full max-w-2xl flex flex-col h-[90vh] shadow-2xl overflow-hidden">
    
    <div class="p-6 border-b border-white/10 flex justify-between items-center bg-white/5">
        <div>
            <h1 class="text-xl font-semibold flex items-center gap-2">
                <span class="text-green-400">🎙️</span> తెలుగు AI సహాయకుడు
            </h1>
            <p class="text-xs text-slate-400 uppercase tracking-widest mt-1">Smart Voice Assistant</p>
        </div>
        <div class="h-3 w-3 bg-green-500 rounded-full animate-pulse"></div>
    </div>

    <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-4">
        <div class="bubble bg-white/10 text-slate-200 self-start">
            నమస్కారం! నేను మీకు ఎలా సహాయపడగలను? (అడగడానికి మైక్ నొక్కండి)
        </div>
    </div>

    <div id="status" class="text-center text-sm text-slate-500 italic pb-2 h-5"></div>

    <div class="p-8 border-t border-white/10 bg-white/5 flex flex-col items-center">
        <button id="mic-btn" onclick="startListening()" 
                class="w-16 h-16 bg-green-500 hover:bg-green-400 text-white rounded-full flex items-center justify-center text-2xl transition-all duration-300 shadow-lg">
            🎤
        </button>
        <p class="mt-4 text-xs text-slate-500">
            Tap to Speak • <span class="text-blue-400 underline decoration-dotted">Chrome Recommended</span>
        </p>
    </div>

</div>

<script>
const WORKER_URL = "https://telugu-ai.vardhan-yahoo999.workers.dev/"; 
const chatContainer = document.getElementById("chat-container");
const statusText = document.getElementById("status");
const micBtn = document.getElementById("mic-btn");

function addMessage(text, isUser){
    const wrapper = document.createElement("div");
    wrapper.className = isUser ? "flex justify-end" : "flex justify-start";
    
    const div = document.createElement("div");
    div.className = isUser 
        ? "bubble bg-blue-600 text-white rounded-tr-none shadow-md" 
        : "bubble bg-white/10 text-slate-200 rounded-tl-none border border-white/5";
    
    div.innerText = text;
    wrapper.appendChild(div);
    chatContainer.appendChild(wrapper);
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

// Speech Recognition Logic
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
    alert("మీ బ్రౌజర్ స్పీచ్ రికగ్నిషన్‌కు మద్దతు ఇవ్వదు. దయచేసి Chrome ఉపయోగించండి.");
}

const recognition = new SpeechRecognition();
recognition.lang = "te-IN";
recognition.interimResults = false;

function startListening(){
    try {
        recognition.start();
        micBtn.classList.add("mic-active");
        statusText.innerText = "నేను వింటున్నాను...";
    } catch (e) {
        console.log("Already listening or error.");
    }
}

recognition.onresult = async (event) => {
    micBtn.classList.remove("mic-active");
    const question = event.results[0][0].transcript;
    addMessage(question, true);
    statusText.innerText = "ఆలోచిస్తున్నాను...";

    try {
        const response = await fetch(WORKER_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question })
        });

        const data = await response.json();
        statusText.innerText = "";
        addMessage(data.answer, false);
        speak(data.answer);

    } catch (error) {
        statusText.innerText = "";
        addMessage("క్షమించండి, సమాచారం పొందలేకపోయాను. మళ్ళీ ప్రయత్నించండి.", false);
    }
};

recognition.onerror = () => {
    micBtn.classList.remove("mic-active");
    statusText.innerText = "క్షమించండి, నేను వినలేకపోయాను.";
};

function speak(text){
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "te-IN";
    utterance.rate = 1.0;
    utterance.pitch = 1.0;
    window.speechSynthesis.speak(utterance);
}
</script>

</body>
</html>
