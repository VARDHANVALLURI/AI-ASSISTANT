<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>తెలుగు AI సహాయకుడు</title>

<style>
body{
  margin:0;
  font-family: system-ui, sans-serif;
  background: linear-gradient(180deg,#0f172a,#020617);
  color:#e5e7eb;
  display:flex;
  justify-content:center;
}
.app{
  max-width:420px;
  width:100%;
  min-height:100vh;
  padding:20px;
}
.header{
  text-align:center;
  margin-top:20px;
}
.header h1{
  font-size:24px;
}
.chat{
  margin-top:30px;
  background:#020617;
  border-radius:20px;
  padding:15px;
  min-height:200px;
}
.bubble{
  margin-bottom:12px;
  line-height:1.5;
}
.user{
  text-align:right;
  color:#38bdf8;
}
.bot{
  text-align:left;
  color:#a7f3d0;
}
.mic{
  margin-top:25px;
  display:flex;
  justify-content:center;
}
button{
  width:70px;
  height:70px;
  border-radius:50%;
  border:none;
  font-size:26px;
  background:#22c55e;
  cursor:pointer;
}
.footer{
  text-align:center;
  font-size:13px;
  opacity:0.6;
  margin-top:20px;
}
</style>
</head>

<body>
<div class="app">

<div class="header">
<h1>🎙️ తెలుగు AI సహాయకుడు</h1>
<p>ఏమైనా అడగండి</p>
</div>

<div class="chat" id="chat">
<div class="bubble bot">నేను సిద్ధంగా ఉన్నాను. చెప్పండి 🙂</div>
</div>

<div class="mic">
<button onclick="start()">🎤</button>
</div>

<div class="footer">
Chrome బ్రౌజర్ ఉపయోగించండి
</div>

</div>

<script>
const chat = document.getElementById("chat");

function add(text,type){
  const div=document.createElement("div");
  div.className="bubble "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

// -------- SPEECH RECOGNITION --------
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const rec=new SR();
rec.lang="te-IN";
rec.interimResults=false;

function start(){
  speak("చెప్పండి");
  setTimeout(()=>rec.start(),400);
}

rec.onresult=(e)=>{
  const q=e.results[0][0].transcript;
  add(q,"user");
  answer(q);
};

// -------- ANSWER LOGIC --------
async function answer(q){
  speak("ఒక క్షణం");
  try{
    const url=`https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(q)}&limit=1&format=json&origin=*`;
    const r=await fetch(url);
    const d=await r.json();

    if(d[2][0]){
      const reply="సంక్షిప్తంగా చెప్పాలంటే, "+d[2][0];
      add(reply,"bot");
      speak(reply);
    }else{
      fallback(q);
    }
  }catch{
    fallback(q);
  }
}

// -------- FALLBACK (ALWAYS ANSWERS) --------
function fallback(q){
  const reply="ఈ విషయంపై ఖచ్చితమైన సమాచారం అందుబాటులో లేదు. అయితే ఇది ఒక ముఖ్యమైన విషయం మరియు మరింత తెలుసుకోవచ్చు.";
  add(reply,"bot");
  speak(reply);
}

// -------- TTS --------
function speak(text){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="te-IN";
  u.rate=1.1;
  speechSynthesis.speak(u);
}
</script>

</body>
</html>
