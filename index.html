<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Telugu AI Assistant</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    padding-top: 80px;
}
button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    background-color: #ffcc00;
    color: black;
}
#output {
    margin-top: 30px;
    width: 70%;
    margin-left: auto;
    margin-right: auto;
    font-size: 18px;
}
</style>
</head>
<body>

<h1>🎙 Telugu AI Assistant</h1>
<p>Click the button and ask anything</p>
<button onclick="startListening()">Start Talking</button>

<div id="output"></div>



<script>

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = 'en-IN';
recognition.interimResults = false;
recognition.continuous = false;

function startListening() {
    speakTelugu("చెప్పండి, నేను వింటున్నాను.");
    setTimeout(() => recognition.start(), 800);
}

recognition.onresult = function(event) {
    const query = event.results[0][0].transcript;
    fetchWikipedia(query);
};

async function fetchWikipedia(query) {
    speakTelugu("శోధిస్తున్నాను...");

    try {
        const response = await fetch(
            `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`
        );

        const data = await response.json();

        if (data.extract) {
            // LIMIT TEXT LENGTH (important for speed)
            const shortText = data.extract.split('. ').slice(0, 2).join('. ') + ".";
            speakTelugu(shortText);
        } else {
            speakTelugu("సమాచారం లభించలేదు.");
        }

    } catch (error) {
        speakTelugu("క్షమించండి, సమాచారం పొందలేకపోయాను.");
    }
}

function speakTelugu(text) {
    speechSynthesis.cancel(); // stop previous speech

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "te-IN";
    utterance.rate = 1.1;   // slightly faster
    utterance.pitch = 1;

    speechSynthesis.speak(utterance);
}

</script>
