<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Fast Telugu AI Assistant</title>

<style>
body {
  background: #0f172a;
  color: #e5e7eb;
  font-family: system-ui;
  text-align: center;
  padding-top: 90px;
}
button {
  padding: 16px 34px;
  font-size: 18px;
  border-radius: 30px;
  border: none;
  background: #22c55e;
  color: black;
  cursor: pointer;
}
#status {
  margin-top: 30px;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>⚡ Telugu Voice Assistant</h1>
<p>Fast • Free • Browser Only</p>
<button onclick="listen()">🎙 Speak</button>
<div id="status"></div>

<script>
// ---------------- CACHE ----------------
const cache = {};

// ---------------- SPEECH RECOGNITION ----------------
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const recog = new SR();
recog.lang = "en-IN";
recog.continuous = false;
recog.interimResults = false;

// ---------------- START ----------------
function listen() {
  speak("చెప్పండి");
  setTimeout(() => recog.start(), 400);
}

// ---------------- RESULT ----------------
recog.onresult = (e) => {
  const q = e.results[0][0].transcript.trim();
  document.getElementById("status").innerText = q;

  if (cache[q]) {
    speak(cache[q]);
    return;
  }

  speak("ఒక క్షణం");
  fetchWiki(q);
};

// ---------------- FETCH WIKI (FAST) ----------------
async function fetchWiki(query) {
  try {
    const url =
      "https://en.wikipedia.org/api/rest_v1/page/summary/" +
      encodeURIComponent(query);

    const r = await fetch(url);
    const d = await r.json();

    if (!d.extract) throw "no data";

    // ULTRA SHORT (1 sentence only)
    const oneLine = d.extract.split(". ")[0] + ".";

    const telugu =
      "సంక్షిప్తంగా చెప్పాలంటే, " + oneLine;

    cache[query] = telugu;
    speak(telugu);

  } catch {
    speak("ఈ విషయం గురించి నాకు సమాచారం లేదు.");
  }
}

// ---------------- SPEAK ----------------
function speak(text) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "te-IN";
  u.rate = 1.15;
  speechSynthesis.speak(u);
}
</script>

</body>
</html>
